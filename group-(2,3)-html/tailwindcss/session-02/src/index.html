<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body
    class="bg-background flex items-center justify-center min-h-screen text-white"
  >
    <div class="container flex justify-center items-center gap-10">
      <div
        class="flex flex-col gap-20 bg-linear-to-tl from-background to-form-bg p-10 rounded-lg max-w-lg"
      >
        <div class="capitalize flex items-center gap-2 mb-5 font-semibold">
          <span
            class="bg-linear-to-tl from-accent to-primary flex items-center justify-center w-8 h-8 rounded-lg font-bold"
            >N</span
          >
          nexus
        </div>
        <div>
          <h1 class="text-4xl font-bold max-w-100 mb-5">
            Start building
            <span
              class="bg-linear-to-tr from-primary to-accent text-transparent bg-clip-text"
              >something amazing</span
            >
          </h1>
          <p class="text-text-secondary max-w-100 mb-5 capitalize">
            join thousands of developers building amazing things with Tailwind
            CSS
          </p>
          <div class="flex items-center gap-2">
            <div
              class="flex items-center justify-center gap-1.5 text-xs font-medium px-3 py-1 rounded-full border border-green-100/30 bg-green-100/10 text-green-300 capitalize transition-colors hover:bg-green-400/20"
            >
              secure
            </div>
            <div
              class="flex items-center justify-center gap-1.5 text-xs font-medium px-3 py-1 rounded-full border border-violet-100/30 bg-violet-400/20 text-violet-200 capitalize transition-colors hover:bg-violet-400/20"
            >
              encrypted
            </div>
            <div
              class="flex items-center justify-center gap-1.5 text-xs font-medium px-3 py-1 rounded-full border border-cyan-400/30 bg-cyan-400/10 text-cyan-200 capitalize transition-colors hover:bg-cyan-400/20"
            >
              fast
            </div>
          </div>
        </div>
        <p class="text-text-secondary text-sm capitalize">
          2025 nexus inc. all rights reserved
        </p>
      </div>
      <!-- <div > -->
      <form
        action=""
        class="flex flex-col gap-2 p-10 rounded-lg max-w-md w-full"
      >
        <h2 class="text-xl font-bold">Create your account</h2>
        <!-- email input  -->
        <div class="flex flex-col gap-1 items-start mt-5">
          <label for="email" class="">Email address</label>
          <input
            type="email"
            id="email"
            placeholder="you@company.com"
            class="bg-input-bg px-4 py-2 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
          />
        </div>
        <!-- password input  -->
        <div class="flex flex-col gap-1 items-start mt-5">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            placeholder="min 8 characters"
            class="bg-input-bg px-4 py-2 rounded-lg w-full focus:outline-none focus:ring-2 focus:ring-primary transition-colors"
          />
        </div>
        <!-- checkbox input   -->
        <div>
          <label for="terms" class="flex items-center my-2 gap-2 text-sm">
            <input
              type="checkbox"
              id="terms"
              class="appearance-none w-4 h-4 rounded bg-input-bg border border-text-secondary/40 checked:bg-primary checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary cursor-pointer transition-colors"
            />
            I agree to the <span class="text-primary">Terms</span>&
            <span class="text-primary">Privacy </span>
          </label>
        </div>
        <!-- btn submit -->
        <button
          type="submit"
          class="w-full bg-primary-hover rounded-lg capitalize py-2 font-semibold"
        >
          create account
        </button>
        <p class="text-text-secondary text-xs text-center capitalize">
          by registering, you agree to our
          <span class="text-primary">Terms</span> &
          <span class="text-primary">Privacy policy</span>
        </p>
      </form>
      <!-- </div> -->
    </div>
  </body>
</html>
