<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="logo">nova</div>

      <ul class="links">
        <li>features</li>
        <li>pricing</li>
        <li>about</li>
        <li>contact</li>
      </ul>

      <button class="btn">get started</button>
    </header>

    <main>
      <div class="container">
        <div class="left-side">
          <div class="badge">🚀 now available</div>
          <h1>build somthing <span>amazing</span> today</h1>
          <p>
            a simple and powerfull platform to help you create , grow and scale
            your next big idea with ease.
          </p>
          <div class="btns">
            <button class="btn">
              get started
              <!-- arrow right -->
              <span>→</span>
            </button>
            <button class="btn bg-btn">learn more</button>
          </div>

          <div class="results">
            <div class="result">
              <h2>10k<span>+</span></h2>
              <p>users</p>
            </div>
            <div class="result">
              <h2>99<span>%</span></h2>
              <p>uptime</p>
            </div>
            <div class="result">
              <h2>4.9<span>*</span></h2>
              <p>rating</p>
            </div>
          </div>
        </div>
        <div class="right-side">
          <!-- dashboard icon -->
          <div class="inner">
            <div class="icon">📊</div>
            <h1>your dashboard</h1>
            <p>replace with your image</p>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
