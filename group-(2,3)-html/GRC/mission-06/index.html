<!doctype html>

    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <!-- head -->
        <div class="head">basic</div>
        <p class="price"><sup>$</sup>0 <span>usd/month</span></p>
        <!-- content -->
        <div class="content">
          <p>150 products</p>
          <p>5 email account</p>
          <p>5 GB bandwidth</p>
          <p>50 GB storage</p>
        </div>

        <button class="btn">SELECT</button>
      </div>
      <div class="card">
        <!-- head -->

      </div>
      <div class="card">
        <!-- head -->

        <p class="price"><sup>$</sup>100 <span>usd/month</span></p>

          <p>150 products</p>

          <p>5 GB bandwidth</p>
          <p>50 GB storage</p>

      </div>

</html>
