<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form action="">
      <!-- input-text -->
      <div>
        <label for="username">username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="enter your name"
          autofocus
          required
          maxlength="30"
          minlength="3"
        />
        <!-- <input type="hidden" /> -->
      </div>
      <br />
      <!-- input-password -->
      <div>
        <label for="password">password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="********"
          maxlength="10"
          minlength="5"
        />
      </div>
      <br />
      <!-- input - email -->
      <div>
        <label for="email">email</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="enter your email"
        />
      </div>
      <br />
      <!-- input date -->
      <input type="date" />
      <input type="month" />
      <input type="week" />

      <br />
      <div>
        <input type="number" min="0" max="10" />
        <input type="range" value="100" max="100" />
      </div>

      <div>
        <input type="color" name="" id="" />
      </div>
      <br />

      <!-- <div>
        <label for="input-file">pic your file</label>
        <input type="file" name="file" id="input-file" />
      </div> -->

      <!-- <div>
        <input type="url" name="" id="" />
        <input type="time" />
      </div> -->

      <!-- checkbox - input  -->
      <div>
        <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike" />
        <label for="vehicle1"> I have a bike</label>
        <br />
        <!-- ------------------- -->
        <input type="checkbox" id="phone" name="vehicle1" value="phone" />
        <label for="phone"> I have a phone</label>
      </div>
      <hr />

      <!-- radio - input  -->
      <div>
        <input type="radio" name="gender" id="male" />
        <label for="male">male</label><br />
        <input type="radio" name="gender" id="female" />
        <label for="female">female</label>
      </div>
      <br />
      <!-- <input type="image" src="../session-02/Tabs.png" alt="" /> -->
      <!-- <img src="" alt="" /> -->

      <!-- input-submit -->
      <div>
        <!-- <input type="submit" value="login" /> -->
        <button type="submit">login</button>
        <input type="reset" />
      </div>
    </form>
  </body>
</html>
