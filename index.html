<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="drawing-wrapper">
      <div class="drawing-margin">
        <div class="clouds-holder">
          <div class="clouds">
            <div class="cloud cloud--1">
              <div class="cloud__edge edge--1"></div>
              <div class="cloud__edge edge--2"></div>
              <div class="cloud__edge edge--3"></div>
              <div class="cloud__edge edge--4"></div>
              <div class="cloud__edge edge--5"></div>
              <div class="cloud__edge edge--6"></div>
            </div>
          </div>
        </div>
        <div class="clouds__overlay"></div>
        <div class="moon"></div>
        <div class="mountain"></div>
        <div class="cat">
          <div class="cat_head">
            <div class="cat__head-part ear1"></div>
            <div class="cat__head-part ear2"></div>
          </div>
          <div class="cat_body"></div>
        </div>
      </div>
    </div>
  </body>
</html>
